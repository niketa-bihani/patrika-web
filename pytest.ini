[pytest]
# Pytest configuration for Playwright tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto
# Keep session-scoped fixtures (e.g. browser) and tests on the SAME event loop.
# Without this, the session-scoped `browser` fixture runs on a different loop
# than each per-function test, and every Playwright await deadlocks.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=reports/pytest-report.html
    --self-contained-html

# Markers
markers =
    smoke: Mark test as a smoke test
    regression: Mark test as a regression test
    critical: Mark test as a critical test
    slow: Mark test as slow running
    integration: Mark test as an integration test
    high_priority: Mark test as high priority
    medium_priority: Mark test as medium priority
    low_priority: Mark test as low priority
    login: Mark test as login-related
    home: Mark test as homepage-related

# Timeouts
timeout = 30

# Logging
log_cli = false
log_cli_level = INFO
log_file = reports/pytest.log
